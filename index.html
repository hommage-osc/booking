<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程調整ページへ移動中</title>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SE4BXZT3WW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());
    gtag('config', 'G-SE4BXZT3WW');

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    window.addEventListener('load', function() {
      const qrId = getParam('utm_content') || 'unknown';

      // GA4イベント送信
      gtag('event', 'qr_booking_redirect', {
        qr_id: qrId,
        destination: 'booking_page'
      });

      // Sheets記録＋メール通知
      const scriptUrl = 'https://script.google.com/macros/s/AKfycbyuVZnPHZDIiA1m6zBl8--hrn__-eN7N84tTBNv_JOTMdjHP0DwasBnmM9dxUy2aYBLIg/exec';
      fetch(scriptUrl + '?qr_id=' + encodeURIComponent(qrId) + '&type=booking')
        .catch(function(){});

      // 予約ページへ移動
      setTimeout(function(){
        window.location.href = "https://b-book.run/@hommage_ki_ryou";
      }, 1500);
    });
  </script>
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#f7f9fc;color:#12315a;">
  <div style="text-align:center;">
    <div style="font-size:18px;font-weight:bold;margin-bottom:10px;">
      お打ち合わせ予約ページへ移動しています...
    </div>
  </div>
</body>
</html>
